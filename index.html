    <link rel="dns-prefetch" href="https://api.recipes.eagombar.uk">
    <link rel="preconnect" href="https://api.recipes.eagombar.uk" crossorigin>

    <!-- Critical CSS (render-blocking but necessary) -->
    <link rel="stylesheet" href="/styles.css" />
    <link rel="shortcut icon" type="image/x-icon" href="/assets/favicon.ico">

    <!-- Module script (deferred by default) -->
    <script src="/main.js" type="module"></script>
</head>

    <header>

        <nav class="wideNav">
            <a class="wideNavItem" href="/home">Home</a>

    <main id="content"></main>

    <div id="imageLightbox" class="lightbox">

    <div id="carouselLightbox" class="carousel-lightbox">
        <button class="carousel-lightbox-close" aria-label="Close">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
